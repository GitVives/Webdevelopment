<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles/style.css">
    <title>Title</title>
</head>
<body>
    <table border="1">

            <tr>
                <td>Product 2</td>

            <tr>
                <td>Product 3</td>
                <td class="prijs">12.20</td>
                <td><input class="input" type="number" value="0" min="0"></td>
                <td class="btw">21</td>
                <td class="subtotaal">0.00</td>
            </tr>
            <tr>
                <td colspan="4">Totaal</td>
                <td id="totaal">0.00</td>
            </tr>
        </tbody>
    </table>
    <input type="button" class="button" id="btn" value="Herbereken">
<script type="text/javascript" charset="utf-8" src="scripts/code.js"></script>

</html>
