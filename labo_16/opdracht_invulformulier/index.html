<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="styles/style.css">
    <title>Formulier</title>
</head>
<body>
    <form action="" method="post">
        <fieldset>
            <legend>Persoonlijke informatie</legend>
            <label for="voornaam">Voornaam*:</label>
            <input id="voornaam" type="text" name="voornaam" placeholder="Your first name" required autofocus>
            <br>
            <label for="familienaam">Familienaam*:</label>
            <input id="familienaam" type="text" name="familienaam" placeholder="Your last name" required>
        </fieldset>
        <fieldset>
            <legend>Sport</legend>
            <p>Welke sport beoefen je?</p>
            <input id="lopen" type="checkbox" name="lopen" value="lopen">
            <label for="lopen">Lopen</label>
            <br>
            <input id="zwemmen" type="checkbox" name="zwemmen" value="zwemmen">
            <label for="zwemmen">Zwemmen</label>
            <br>
            <input id="roeien" type="checkbox" name="roeien" value="roeien">
            <label for="roeien">Roeien</label>
        </fieldset>
        <fieldset>
            <legend>Communicatievoorkeur</legend>
            <p>Hoe kunnen we je bereiken?</p>
            <input id="post" type="radio" name="post" value="post">
            <label for="post">Per Post</label>
            <br>
            <input id="email" type="radio" name="email" value="email">
            <label for="email">E-mail</label>
        </fieldset>
        <fieldset>
            <legend>Favorieten</legend>
            <label for="favorieteFilm">Favoriete film:</label>
            <input id="favorieteFilm" type="text" name="favorieteFilm">
            <br>
            <label for="favorieteQuote">Favoriete quote:</label>
            <input id="favorieteQuote" type="text" name="favorieteQuote" placeholder="Schrijf je favoriete quote">
            <br>
            <label for="favorieteEten">Favoriete eten:</label>
            <select id="favorieteEten" name="favorieteEten" size="3" multiple="multiple">
                <option value="hamburger">Hamburger</option>
                <option value="hotdog">Hot-dog</option>
                <option value="pizza">Pizza</option>
            </select>
            <br>
            <label for="favorieteBrowser">Favoriete browser:</label>
            <input id="favorieteBrowser" type="text" name="favorieteBrowser">
        </fieldset>
        <fieldset>
            <legend>Beveiliging &amp; contact</legend>
            <label for="wachtwoord">Wachtwoord*:</label>
            <input id="wachtwoord" type="text" name="wachtwoord" required>
            <br>
            <label for="emailadres">E-mailadres:</label>
            <input id="emailadres" type=”email” name=”txtEmail” placeholder="Geef je e-mailadres in">
            <br>
            <label for="favorieteSite">Favoriete site:</label>
            <input id="favorieteSite" type="url" name="txtUrl" placeholder="Geef de URL van je favoriete site">
        </fieldset>
        <fieldset>
            <legend>Extra informatie</legend>
            <label for="favorietGetal1">Favoriete getal tussen 1-10:</label>
            <input id="favorietGetal1" type="number" name="favorietGetal1" min="1" max="10">
            <br>
            <label for="favorietGetal2">Favoriete getal tussen 11-1000:</label>
            <input id="favorietGetal2" type="range" name="favorietGetal2" min="11" max="1000" step="1">
            <br>
            <label for="geboortedatum">Wanneer ben je geboren?</label>
            <input id="geboortedatum" type="date" name="geboortedatum">
            <br>
            <label for="belgischePostcode">Belgische postcode*:</label>
            <input type="text" id="belgischePostcode" name="belgischePostcode" inputmode="numeric" pattern="^(1000|[1-8][0-9]{3}|9[0-8][0-9]{2}|99[0-8][0-9]|999[0-2])$" maxlength="4" placeholder="9999" required>
        </fieldset>
        <fieldset>
            <legend>Varia</legend>
            <label for="search">Zoeken naar iets:</label>
            <input id="search" type=”search” name=”txtSearch”>
            <br>
            <label for="colorPicker">Wat is je lievelingskleur?</label>
            <input id="colorPicker" type="color" name="colorPicker" value="#000000">
            <br>
            <input type="file" name="file">
        </fieldset>
        <button type="submit">Submit</button>
    </form>
<script type="text/javascript" charset="utf-8" src="scripts/code.js"></script>
</body>
</html>
